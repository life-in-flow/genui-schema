version: "1.0"
system: flowmingo

size:
  "0": 0
  hairline: 0.5
  "025": 1
  "0375": 1.5
  "05": 2
  "1": 4
  "1_5": 6
  "2": 8
  "3": 12
  "4": 16
  "5": 20
  "6": 24
  "7": 28
  "8": 32
  "9": 36
  "10": 40
  "11": 44
  "12": 48
  "13": 52
  "14": 56
  "15": 60
  "16": 64
  "17": 68
  "18": 72
  "19": 76
  "20": 80

spacing:
  none:
    value: 0
    alias: size/0
  xs:
    value: 2
    alias: size/05
    use: "tight gaps"
  sm:
    value: 4
    alias: size/1
    use: "tight element gaps (icon + label)"
  md:
    value: 8
    alias: size/2
    use: "standard inner padding"
  lg:
    value: 12
    alias: size/3
    use: "list item gaps"
  xl:
    value: 16
    alias: size/4
    use: "card padding, child gap inside card"
  2xl:
    value: 20
    alias: size/5
  3xl:
    value: 24
    alias: size/6
    use: "large card padding"
  4xl:
    value: 32
    alias: size/8
    use: "section gaps"
  5xl:
    value: 40
    alias: size/10
  6xl:
    value: 48
    alias: size/12
    use: "hero section bottom margin"
  7xl:
    value: 56
    alias: size/14
  8xl:
    value: 64
    alias: size/16
    use: "page-level vertical rhythm"
  9xl:
    value: 72
    alias: size/18
  10xl:
    value: 80
    alias: size/20

radius:
  xs:
    value: 2
    alias: size/05
  sm:
    value: 4
    alias: size/1
  md:
    value: 8
    alias: size/2
  lg:
    value: 12
    alias: size/3
  xl:
    value: 16
    alias: size/4
  2xl:
    value: 24
    alias: size/6
  full:
    value: 9999

stroke:
  hairline:
    value: 0.5
    alias: size/hairline
  sm:
    value: 1
    alias: size/025
  md:
    value: 1.5
    alias: size/0375
  lg:
    value: 2
    alias: size/05
  xl:
    value: 4
    alias: size/1

